name: Test actions/github-script

description: Test actions/github-script

runs:
  using: "composite"
  steps:
    - name: use github-script
      uses: actions/github-script@e69ef5462fd455e02edcaf4dd7708eda96b9eda0 # v7.0.0
      id: exec-script
      with:
        script: return "hello!"
        result-encoding: string

    - name: Show result
      shell: bash
      env:
        RESULT: ${{ steps.exec-script.outputs.result }}
      run: echo "${RESULT}"
